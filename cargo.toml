[package]
name = "sapio_sovereign"
version = "16.0.0"
edition = "2021"

[dependencies]
# The XRPL SDK for institutional ledger access
xrpl = "0.1.0" 
# For ISO 20022 pacs.008 XML generation
mx-message = "3.1" 
# For high-speed async processing
tokio = { version = "1", features = ["full"] }
# For pulling live market prices
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"